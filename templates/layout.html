<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    {% if title %}
      <title>Wynne's Strava Activities - {{ title }}</title>
    {% else %}
      <title>Wynne's Strava Activities</title>
    {% endif %}

    <meta name="description" content="A full-stack data science project by Wynne Philpott">
    <meta name="author" content="Wynne Philpott">

    <!-- Preconnect for Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Custom Font -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap"
          rel="stylesheet">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">

    <!-- Stylesheet -->
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', path='css/style.css') }}">

    <meta name="theme-color" content="#527c9f">
  </head>
  <body class="d-flex flex-column min-vh-100">
    <header class="site-header">
      <nav class="navbar navbar-expand-md bg-steel fixed-top"
           data-bs-theme="dark">
        <div class="container">
          <a class="navbar-brand me-4" href="{{ url_for('home') }}">
            Wynne's Strava Activities
          </a>
          <button class="navbar-toggler"
                  type="button"
                  data-bs-toggle="collapse"
                  data-bs-target="#navbarToggle"
                  aria-controls="navbarToggle"
                  aria-expanded="false"
                  aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarToggle">
            <div class="navbar-nav me-auto">
              <a class="nav-link {% block nav_home %}{% endblock %}" href="{{ url_for('home') }}">Home</a>
              <a class="nav-link {% block nav_design %}{% endblock %}" href="{{ url_for('behind_the_design') }}">Behind the Design</a>
            </div>
            <div class="nav-item dropdown">
              <a class="nav-link dropdown-toggle"
                 href="#"
                 role="button"
                 id="bd-theme"
                 data-bs-toggle="dropdown"
                 aria-expanded="false">
                <span id="bd-theme-text">Auto</span>
              </a>
              <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="bd-theme">
                <li>
                  <button class="dropdown-item" type="button" data-bs-theme-value="light">Light</button>
                </li>
                <li>
                  <button class="dropdown-item" type="button" data-bs-theme-value="dark">Dark</button>
                </li>
                <li>
                  <button class="dropdown-item" type="button" data-bs-theme-value="auto">Auto</button>
                </li>
              </ul>
            </div>
          </div>
        </div>
      </nav>
    </header>

    <main role="main" class="container">
      {% block content %}
      {% endblock content %}
    </main>

    <footer class="mt-auto py-3 bg-body-tertiary border-top">
      <div class="container text-center">
        <p class="text-body-secondary mb-0">
          &copy; 2026 Wynne Philpott
        </p>
      </div>
    </footer>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>

    <!-- Dark Mode Toggle -->
    <script>
      const setTheme = (theme) => {
        if (theme === 'auto') {
          document.documentElement.setAttribute('data-bs-theme',
            window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        } else {
          document.documentElement.setAttribute('data-bs-theme', theme);
        }
        localStorage.setItem('theme', theme);

        const themeText = { light: 'Light', dark: 'Dark', auto: 'Auto' };
        document.getElementById('bd-theme-text').textContent = themeText[theme];
      };

      document.querySelectorAll('[data-bs-theme-value]').forEach(button => {
        button.addEventListener('click', () => setTheme(button.getAttribute('data-bs-theme-value')));
      });

      setTheme(localStorage.getItem('theme') || 'auto');
    </script>

    {% block scripts %}
    {% endblock scripts %}
  </body>
</html>
